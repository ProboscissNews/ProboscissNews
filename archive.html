<!DOCTYPE html>
<html>
<head>
<title>Probosciss News Archive</title>
<style>
body{
  font-family:'Verdana','Arial',sans-serif;
  margin:0;
  background:#ffffe0;
  color:#222;
  text-align:center;
  padding:50px;
}

input{
  padding:10px;
  font-size:16px;
  border:2px solid #003366;
  border-radius:5px;
  width:250px;
}

button{
  padding:10px 20px;
  font-size:16px;
  border:2px solid #003366;
  border-radius:5px;
  background:#ffcc00;
  cursor:pointer;
}

h1{
  color:#003366;
  text-shadow:1px 1px 2px #000;
}

/* === Overlay === */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:black;
  z-index:9999;
  display:none;
}
#overlay-text{
  opacity:0;
  font-size:50px;
  color:white;
  text-align:center;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:'Verdana',sans-serif;
}
</style>
</head>
<body>

<h1>Probosciss News Archive</h1>
<p>Enter access code to view restricted reports:</p>
<input type="password" id="archivePass" placeholder="Enter password">
<button onclick="checkPassword()">Enter</button>

<!-- Overlay -->
<div id="overlay">
  <div id="overlay-text">You went too far...</div>
  <audio id="staticAudio" autoplay loop>
    <source src="static.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
// Check password function
function checkPassword(){
  var pass = document.getElementById('archivePass').value;
  if(pass === 'WOW' || pass==='DAVE' || pass==='V2'){
    window.location.href='archive-restricted.html';
  } else {
    triggerOverlay();
  }
}

function triggerOverlay(){
  var overlay = document.getElementById('overlay');
  var text = document.getElementById('overlay-text');
  var audio = document.getElementById('staticAudio');

  overlay.style.display = 'block';
  audio.play();

  setTimeout(function(){
    text.style.transition = "opacity 1.5s";
    text.style.opacity = 1;
  }, 3000);
}
</script>

</body>
</html>
